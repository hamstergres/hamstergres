name: PostgreSQL Compatibility

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: postgres-compatibility-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pg-regress:
    name: Full PostgreSQL regression suite
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Check out Hamstergres
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore the latest default-branch compatibility baseline
        id: baseline
        uses: actions/cache/restore@v6
        with:
          path: /tmp/hamstergres-pgcompat-baseline/results.json
          key: hamstergres-pgcompat-baseline-unmatched
          restore-keys: |
            hamstergres-pgcompat-baseline-${{ github.event.repository.default_branch }}-

      - name: Run PostgreSQL compatibility suite
        id: compatibility
        env:
          POSTGRES_COMPATIBILITY_BASELINE: /tmp/hamstergres-pgcompat-baseline/results.json
        run: make test-postgres-compatibility

      - name: Add report to the job summary
        if: ${{ !cancelled() }}
        run: |
          if [[ -f build/postgres-compatibility/compatibility-report.md ]]; then
            sed -n '1,320p' build/postgres-compatibility/compatibility-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload compatibility report, raw diffs, and Proxy log
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: postgres-compatibility-${{ github.run_id }}
          path: |
            build/postgres-compatibility/compatibility-report.md
            build/postgres-compatibility/results.json
            build/postgres-compatibility/regression.diffs
            build/postgres-compatibility/regression.out
            build/postgres-compatibility/pg_regress.log
            build/postgres-compatibility/proxy.log
            build/postgres-compatibility/badges/overall.json
          if-no-files-found: warn
          retention-days: 30

      - name: Locate compatibility badge endpoint
        id: badge
        if: ${{ !cancelled() }}
        run: |
          if [[ -f build/postgres-compatibility/badges/overall.json ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      # Mirrors Multigres' live compatibility badges: the report generator
      # writes Shields.io endpoint JSON, and default-branch runs publish it to
      # one stable gh-pages branch URL without editing README.md on every run.
      - name: Publish compatibility badge endpoint
        if: >-
          !cancelled() &&
          steps.badge.outputs.available == 'true' &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          github.ref_name == github.event.repository.default_branch
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/postgres-compatibility/badges
          publish_branch: gh-pages
          destination_dir: postgres-compatibility
          keep_files: true
          commit_message: "chore(pgcompat): update live badge endpoint"

      - name: Stage the new default-branch baseline
        if: ${{ steps.compatibility.outcome == 'success' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref_name == github.event.repository.default_branch }}
        run: |
          mkdir -p /tmp/hamstergres-pgcompat-baseline
          cp build/postgres-compatibility/results.json /tmp/hamstergres-pgcompat-baseline/results.json

      - name: Save the new default-branch compatibility baseline
        if: ${{ steps.compatibility.outcome == 'success' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref_name == github.event.repository.default_branch }}
        uses: actions/cache/save@v6
        with:
          path: /tmp/hamstergres-pgcompat-baseline/results.json
          key: hamstergres-pgcompat-baseline-${{ github.event.repository.default_branch }}-${{ github.run_id }}
