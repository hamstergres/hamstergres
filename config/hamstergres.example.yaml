# This is intentionally static for the first proof of concept.  A future
# control plane will replace the virtual-shard map with dynamic metadata.
listen:
  address: "0.0.0.0:6432"

# Four Go execution threads preserve routing concurrency without tying the
# scheduler width to the host CPU count. Tune this after measuring the deployed
# workload, or set GOMAXPROCS instead when this value is omitted.
runtime:
  max_procs: 4

# The operator status page, JSON API, and unauthenticated Prometheus endpoint
# at /metrics. Keep this on a private network or behind your usual access
# control in any non-development deployment.
status:
  address: "127.0.0.1:8080"

# Structured JSON events stay local. Set log_file to append them to a private
# file; leave it empty to retain the process supervisor's normal stderr logs.
observability:
  log_file: ""

# Safe by default. Set to false only when partial commits across Burrows are an
# accepted risk; the Proxy will use ordinary sequential COMMIT instead of 2PC.
transactions:
  two_phase_commit: true
  # Bounds waits that PostgreSQL cannot identify as cross-Burrow lock cycles.
  # Applications should retry the complete transaction after SQLSTATE 55P03.
  lock_timeout: "1s"

# Hamstergres Nest stores independent schema and topology revisions in etcd.
# Use the Docker service hostname in Compose, or localhost:2379 from the host.
nest:
  endpoint: "http://hamstergres-nest:2379"
  registry_key: "/hamstergres/schema-registry/v3"
  topology_key: "/hamstergres/topology/v1"
  sequence_key: "/hamstergres/sequences/global-id/v1"

sharding:
  virtual_shards: 65536

  # Tables are sharded only when one or more columns have the exact PostgreSQL
  # comment 'hamstergres.shard_key'. Multiple markers form an ordered compound
  # shard key. Tables without that marker follow this fleet-wide
  # policy. primary sends every read and write to one Burrow. replicated sends
  # writes to every Burrow and load-balances reads across Burrows.
  unsharded_tables:
    mode: "primary"
    primary_burrow: "burrow-01"

  # A physical_shard is called a Burrow in Hamstergres operator language.
  physical_shards:
    burrow-01:
      # Docker-network address. Use localhost:5541 from the host instead.
      dsn: "postgres://hamster:hamster@burrow-01:5432/hamstergres?sslmode=disable"
    burrow-02:
      # Docker-network address. Use localhost:5542 from the host instead.
      dsn: "postgres://hamster:hamster@burrow-02:5432/hamstergres?sslmode=disable"

  # The Proxy discovers annotated shard keys from PostgreSQL catalogs. A
  # shard-key value hashes into 64k vshards. A fresh Nest bootstraps the old
  # modulo placement once; later routing reads the versioned topology catalog.
