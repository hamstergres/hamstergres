# Host-run gateway configuration for the Docker Compose development Burrows.
listen:
  address: "127.0.0.1:6432"

runtime:
  max_procs: 4

status:
  address: "127.0.0.1:8080"

transactions:
  two_phase_commit: true
  lock_timeout: "1s"

nest:
  endpoint: "http://127.0.0.1:2379"
  registry_key: "/hamstergres/schema-registry/v3"
  sequence_key: "/hamstergres/sequences/global-id/v1"

sharding:
  unsharded_tables:
    mode: "primary"
    primary_burrow: "burrow-01"
  physical_shards:
    burrow-01:
      dsn: "postgres://hamster:hamster@localhost:5541/hamstergres?sslmode=disable"
    burrow-02:
      dsn: "postgres://hamster:hamster@localhost:5542/hamstergres?sslmode=disable"
